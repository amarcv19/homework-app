name: Deploy Project 
on: [push, workflow_dispatch]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps: 
      - name: Get Code 
        uses: actions/checkout@v6
      - name: Install Node.js 
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Dependencies 
        run: npm ci 
      - name: Linting code 
        run: npm run lint 
      - name: Build 
        run: npm run build 
      - name: Test Project 
        run: npm run test 
      - name: Deploy Project 
        run: echo "deploying ..."