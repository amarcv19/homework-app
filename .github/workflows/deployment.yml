name: Deploy Project 
on: [push, workflow_dispatch]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps: 
      - name: Get Code 
        uses: actions/checkout@v6
      - name: Install Node.js 
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Dependencies 
        run: npm ci 
  
  lint: 
    needs: deploy 
    runs-on: ubuntu-latest 
    steps: 
      - name: Lint Project 
        run: npm run lint 

  test: 
    needs: [deploy,lint]
    runs-on: ubuntu-latest 
    steps: 
      - name: Test Project
        run: npm run test 
  build:
    needs: [deploy, lint, test]
    runs-on: ubuntu-latest 
    steps: 
      - name: Build Project
        run: npm run build 
        